    <style>
      :root {
        color-scheme: dark;
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
        background: #000;
        color: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.1),
            transparent 36%
          ),
          #000;
        color: #fff;
      }

      main {
        width: min(100%, 42rem);
        margin: 0 auto;
        padding: 1.25rem;
      }

      .shell {
        display: grid;
        gap: 1.25rem;
        padding: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.95;
      }

      .lede {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.6;
      }

      .controls {
        display: grid;
        gap: 1rem;
      }

      #switcher {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      #switcher button[aria-pressed='false'] {
        background: transparent;
        color: #fff;
      }

      .control-card {
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.03);
      }

      .control-card h5,
      .control-card p {
        margin: 0;
      }

      .control-card p {
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.5;
      }

      .field-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      .icon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: auto;
        background: transparent;
        color: #fff;
      }

      .icon-button svg {
        width: 1rem;
        height: 1rem;
        fill: currentColor;
      }

      label {
        display: grid;
        gap: 0.55rem;
        font-size: 0.95rem;
      }

      input,
      button,
      a {
        border-radius: 999px;
      }

      input[type='text'],
      input[type='number'],
      textarea {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #050505;
        color: #fff;
        font: inherit;
      }

      textarea {
        min-height: 8rem;
        border-radius: 1rem;
        resize: vertical;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.38);
      }

      input[type='text']:focus,
      input[type='number']:focus,
      textarea:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.3);
      }

      button {
        padding: 0.9rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #fff;
        color: #000;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .chat {
        display: grid;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.03);
      }

      #messages {
        min-height: 8rem;
        max-height: 18rem;
        overflow-y: auto;
        padding: 0.25rem 0;
        line-height: 1.6;
      }

      .composer {
        display: grid;
        gap: 0.75rem;
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
      }

      .toggle input {
        width: 1.35rem;
        height: 1.35rem;
        margin: 0;
        accent-color: #fff;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .links a,
      .spec-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        min-height: 2.5rem;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        text-decoration: none;
      }

      .links a:hover,
      .spec-link:hover {
        border-color: rgba(255, 255, 255, 0.22);
      }

      .spec-link {
        width: fit-content;
      }

      .links a {
        font-weight: 600;
      }

      .links img {
        width: 1rem;
        height: 1rem;
        flex: 0 0 1rem;
      }

      @media (min-width: 40rem) {
        main {
          padding: 2rem;
        }

        .shell {
          padding: 1.75rem;
        }

        .toggle {
          grid-column: 1 / -1;
        }

        .composer {
          grid-template-columns: minmax(0, 1fr) auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <nav class="links" aria-label="Project links">
          <a href="https://jsr.io/@sovereignbase/peer2peer">
            <img src="https://cdn.simpleicons.org/jsr/white" alt="" />
            jsr
          </a>
          <a href="https://www.npmjs.com/package/@sovereignbase/peer2peer">
            <img src="https://cdn.simpleicons.org/npm/white" alt="" />
            npm
          </a>
          <a href="https://github.com/sovereignbase/peer2peer">
            <img src="https://cdn.simpleicons.org/github/white" alt="" />
            GitHub
          </a>
        </nav>

        <h1>P2P tool for Sovereignbase</h1>
        <p class="lede">
          Open this page on two devices and follow the instructions to try a
          peer to peer messenger demo.
        </p>

        <div id="switcher">
          <button id="qrMode" type="button" aria-pressed="true">QR Code</button>
          <button id="copyPasteMode" type="button" aria-pressed="false">
            Copy Paste
          </button>
        </div>

        <input id="name" type="text" placeholder="Your name" />

        <div id="controls" class="controls"></div>
        <div class="chat">
          <div id="messages" aria-live="polite"></div>
          <div class="composer">
            <input
              id="message-input"
              type="text"
              placeholder="Write a message..."
            />
            <button id="sendMessage">Send</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
